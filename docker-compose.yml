# 主播录播归档系统 · Docker 编排(对应 design.md §11)
#
# 用法:
#   1) cp .env.example .env  并填好密钥(见 .env.example 注释)
#   2) docker compose up -d --build           # 起 postgres / broker / backend
#   3) 浏览器打开 http://<host>:8080 登录 → 顶栏「Telegram 登录」完成首次 tdl 登录
#   4) docker compose run --rm sync add-channel <channel_id> <label>
#      docker compose run --rm sync run        # 同步入库
#
# 安全要点(§11):tdl session 卷仅 broker 挂载;sync/backend 经 broker 访问 Telegram,不碰 session。
name: telegram-online-player

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-recordings}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-recordings}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  broker:
    build:
      context: .
      target: broker
    environment:
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      BROKER_INTERNAL_TOKEN: ${BROKER_INTERNAL_TOKEN}
      BROKER_ADDR: ":8090"
      TG_SESSION_PATH: "/data/tdl/session.json"
      BROKER_RPS: ${BROKER_RPS:-2}
      BROKER_MAX_CONCURRENT: ${BROKER_MAX_CONCURRENT:-1}
    volumes:
      - tdl-session:/data/tdl   # ← 仅 broker 挂载 session 卷
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  backend:
    build:
      context: .
      target: backend
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_started   # 仅需 broker 进程在;目录/登录无需等其连上 Telegram
    environment:
      ACCESS_PASSWORD_HASH: ${ACCESS_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      PLAY_URL_SECRET: ${PLAY_URL_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-recordings}?sslmode=disable"
      BROKER_URL: "http://broker:8090"
      BROKER_INTERNAL_TOKEN: ${BROKER_INTERNAL_TOKEN}
      MEDIA_TIMEZONE: ${MEDIA_TIMEZONE:-Asia/Shanghai}
      CACHE_DIR: "/cache"
      CACHE_MAX_BYTES: ${CACHE_MAX_BYTES:-21474836480}
      TRANSCODE_CONCURRENCY: ${TRANSCODE_CONCURRENCY:-1}
    volumes:
      - cache:/cache
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

  # 同步服务:默认不随 up 启动(tools profile),按需运行:
  #   docker compose run --rm sync add-channel <channel_id> <label>
  #   docker compose run --rm sync list-channels
  #   docker compose run --rm sync run
  # 周期同步:宿主机 cron 调上面的 run 即可。
  sync:
    build:
      context: .
      target: sync
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-recordings}?sslmode=disable"
      BROKER_URL: "http://broker:8090"
      BROKER_INTERNAL_TOKEN: ${BROKER_INTERNAL_TOKEN}
      MEDIA_TIMEZONE: ${MEDIA_TIMEZONE:-Asia/Shanghai}

volumes:
  pgdata:
  tdl-session:
  cache:
