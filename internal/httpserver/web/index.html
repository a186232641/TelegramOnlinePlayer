<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>主播录播归档</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 0;
         min-height: 100vh; display: grid; place-items: center; background: #111; color: #eee; }
  .card { background: #1c1c1c; padding: 32px 28px; border-radius: 12px;
          box-shadow: 0 4px 16px rgba(0,0,0,.4); width: 320px; }
  h1 { font-size: 18px; margin: 0 0 16px; font-weight: 500; }
  input { width: 100%; padding: 10px 12px; box-sizing: border-box;
          background: #2a2a2a; border: 1px solid #333; color: #eee;
          border-radius: 6px; font-size: 14px; }
  input:focus { outline: none; border-color: #4a90e2; }
  button { width: 100%; margin-top: 12px; padding: 10px;
           background: #4a90e2; color: #fff; border: 0; border-radius: 6px;
           font-size: 14px; cursor: pointer; }
  button:disabled { opacity: .6; cursor: not-allowed; }
  .err { color: #e25555; font-size: 13px; margin-top: 10px; min-height: 18px; }
  .ok { color: #5cb85c; }
</style>
</head>
<body>
<div class="card">
  <h1>访问密码</h1>
  <form id="f">
    <input id="pw" type="password" autocomplete="current-password" autofocus required>
    <button id="btn" type="submit">登录</button>
    <div id="msg" class="err"></div>
  </form>
</div>
<script>
const f = document.getElementById('f');
const pw = document.getElementById('pw');
const btn = document.getElementById('btn');
const msg = document.getElementById('msg');

f.addEventListener('submit', async (e) => {
  e.preventDefault();
  btn.disabled = true; msg.textContent = ''; msg.className = 'err';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw.value }),
    });
    if (res.ok) {
      msg.className = 'ok'; msg.textContent = '登录成功';
      // 后续替换为目录页路径
      setTimeout(() => { location.href = '/'; }, 300);
      return;
    }
    if (res.status === 429) {
      const data = await res.json().catch(() => ({}));
      const sec = Math.ceil((data.retry_after_ms || 0) / 1000);
      msg.textContent = `失败次数过多,请 ${sec} 秒后再试`;
    } else {
      msg.textContent = '密码错误';
    }
  } catch (err) {
    msg.textContent = '网络错误';
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
